
# Mutations for Data Migration and App Logic

# --- User Mutations ---
mutation upsertUser($id: String!, $email: String, $nickname: String, $profileImage: String, $role: String, $themePreference: String, $isFirstLogin: Boolean, $reviewsWritten: Int, $heartsReceived: Int, $tasteProfile: Any) @auth(level: PUBLIC) {
  user_upsert(data: {
    id: $id,
    email: $email,
    nickname: $nickname,
    profileImage: $profileImage,
    role: $role,
    themePreference: $themePreference,
    isFirstLogin: $isFirstLogin,
    reviewsWritten: $reviewsWritten,
    heartsReceived: $heartsReceived,
    tasteProfile: $tasteProfile
  })
}

# --- Spirit Mutations ---
mutation upsertSpirit(
  $id: String!,
  $name: String!,
  $nameEn: String,
  $category: String!,
  $categoryEn: String,
  $mainCategory: String,
  $subcategory: String,
  $distillery: String,
  $bottler: String,
  $abv: Float,
  $volume: Int,
  $country: String,
  $region: String,
  $imageUrl: String!,
  $thumbnailUrl: String,
  $descriptionKo: String,
  $descriptionEn: String,
  $pairingGuideKo: String,
  $pairingGuideEn: String,
  $noseTags: [String!],
  $palateTags: [String!],
  $finishTags: [String!],
  $tastingNote: String,
  $status: String,
  $isPublished: Boolean,
  $isReviewed: Boolean,
  $rating: Float,
  $reviewCount: Int,
  $importer: String,
  $rawCategory: String,
  $metadata: Any
) @auth(expr: "auth != null && auth.uid == 'fiO8qf1PjLZAPBNcJmvy1cpqrY52'") {
  spirit_upsert(data: {
    id: $id,
    name: $name,
    nameEn: $nameEn,
    category: $category,
    categoryEn: $categoryEn,
    mainCategory: $mainCategory,
    subcategory: $subcategory,
    distillery: $distillery,
    bottler: $bottler,
    abv: $abv,
    volume: $volume,
    country: $country,
    region: $region,
    imageUrl: $imageUrl,
    thumbnailUrl: $thumbnailUrl,
    descriptionKo: $descriptionKo,
    descriptionEn: $descriptionEn,
    pairingGuideKo: $pairingGuideKo,
    pairingGuideEn: $pairingGuideEn,
    noseTags: $noseTags,
    palateTags: $palateTags,
    finishTags: $finishTags,
    tastingNote: $tastingNote,
    status: $status,
    importer: $importer,
    rawCategory: $rawCategory,
    isPublished: $isPublished,
    isReviewed: $isReviewed,
    rating: $rating,
    reviewCount: $reviewCount,
    metadata: $metadata
  })
}

# --- Home Curation Mutations ---
mutation upsertNewArrival($id: String!, $spiritId: String!, $displayOrder: Int, $tags: [String!]) @auth(expr: "auth != null && auth.uid == 'fiO8qf1PjLZAPBNcJmvy1cpqrY52'") {
  newArrival_upsert(data: {
    id: $id,
    spiritId: $spiritId,
    displayOrder: $displayOrder,
    tags: $tags
  })
}

# --- Review Mutations ---
mutation upsertReview(
  $id: UUID!,
  $spiritId: String!,
  $userId: String!,
  $rating: Int!,
  $title: String,
  $content: String!,
  $nose: String,
  $palate: String,
  $finish: String,
  $likes: Int,
  $likedBy: [String!],
  $isPublished: Boolean,
  $imageUrls: [String!],
  $createdAt: Timestamp,
  $updatedAt: Timestamp
) @auth(expr: "auth != null && auth.uid == vars.userId") {
  spiritReview_upsert(data: {
    id: $id,
    spiritId: $spiritId,
    userId: $userId,
    rating: $rating,
    title: $title,
    content: $content,
    nose: $nose,
    palate: $palate,
    finish: $finish,
    likes: $likes,
    likedBy: $likedBy,
    isPublished: $isPublished,
    imageUrls: $imageUrls,
    createdAt: $createdAt,
    updatedAt: $updatedAt
  })
}

mutation updateReview(
  $id: UUID!,
  $likes: Int,
  $likedBy: [String!]
) @auth(expr: "auth != null") {
  spiritReview_update(id: $id, data: {
    likes: $likes,
    likedBy: $likedBy
  })
}

# --- News Mutations ---
mutation upsertNews(
  $id: String!,
  $title: String!,
  $content: String!,
  $imageUrl: String,
  $category: String,
  $source: String,
  $link: String,
  $date: String,
  $translations: Any,
  $tags: Any
) @auth(expr: "auth != null && auth.uid == 'fiO8qf1PjLZAPBNcJmvy1cpqrY52'") {
  newsArticle_upsert(data: {
    id: $id,
    title: $title,
    content: $content,
    imageUrl: $imageUrl,
    category: $category,
    source: $source,
    link: $link,
    date: $date,
    translations: $translations,
    newsTags: $tags
  })
}

mutation deleteNews($id: String!) @auth(expr: "auth != null && auth.uid == 'fiO8qf1PjLZAPBNcJmvy1cpqrY52'") {
  newsArticle_delete(id: $id)
}

# --- Cabinet Mutations ---
mutation upsertCabinet(
  $userId: String!,
  $spiritId: String!,
  $addedAt: Timestamp,
  $notes: String,
  $rating: Int,
  $isFavorite: Boolean
) @auth(expr: "auth != null && auth.uid == vars.userId") {
  userCabinet_upsert(data: {
    userId: $userId,
    spiritId: $spiritId,
    addedAt: $addedAt,
    notes: $notes,
    rating: $rating,
    isFavorite: $isFavorite
  })
}

mutation deleteCabinet($userId: String!, $spiritId: String!) @auth(expr: "auth != null && auth.uid == vars.userId") {
  userCabinet_delete(key: { userId: $userId, spiritId: $spiritId })
}

