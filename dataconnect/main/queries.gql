query listSpiritsForWorldCup($category: String, $subcategories: [String!]) @auth(level: PUBLIC) {
  spirits(where: {
    _and: [
      { isPublished: { eq: true } },
      {
        _or: [
          { category: { eq: $category } },
          { categoryEn: { eq: $category } }
        ]
      },
      { subcategory: { in: $subcategories } }
    ]
  }, limit: 500) {
    id
    name
    nameEn
    imageUrl
    thumbnailUrl
    category
    categoryEn
    subcategory
    distillery
    abv
    country
    region
    noseTags
    palateTags
    finishTags
    createdAt
  }
}

