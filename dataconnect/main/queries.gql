
# Queries for the App

query listSpirits($category: String, $subcategory: String, $country: String) @auth(level: PUBLIC) {
  spirits(where: { 
    isPublished: { eq: true },
    category: { eq: $category },
    subcategory: { eq: $subcategory },
    country: { eq: $country }
  }) {
    id
    name
    nameEn
    category
    categoryEn
    imageUrl
    thumbnailUrl
    isPublished
    abv
    distillery
    rating
    reviewCount
  }
}

query searchSpiritsPublic(
  $search: String,
  $category: String,
  $subcategory: String,
  $limit: Int,
  $offset: Int
) @auth(level: PUBLIC) {
  spirits(
    limit: $limit,
    offset: $offset,
    orderBy: [{ updatedAt: DESC }],
    where: {
      _and: [
        { isPublished: { eq: true } },
        { category: { eq: $category } },
        { subcategory: { eq: $subcategory } },
        { 
          _or: [
            { name: { contains: $search } },
            { nameEn: { contains: $search } },
            { distillery: { contains: $search } }
          ]
        }
      ]
    }
  ) {
    id
    name
    nameEn
    category
    categoryEn
    subcategory
    imageUrl
    thumbnailUrl
    abv
    distillery
    rating
    reviewCount
    metadata
  }
}

query listAllCategories @auth(level: PUBLIC) {
  spirits(where: { isPublished: { eq: true } }) {
    category
    categoryEn
  }
}

query listAllSubcategories($category: String) @auth(level: PUBLIC) {
  spirits(where: { isPublished: { eq: true }, category: { eq: $category } }) {
    subcategory
  }
}

query listTrendingSpirits($limit: Int) @auth(level: PUBLIC) {
  spirits(
    where: { isPublished: { eq: true } },
    orderBy: [{ reviewCount: DESC }, { rating: DESC }],
    limit: $limit
  ) {
    id
    name
    nameEn
    category
    categoryEn
    imageUrl
    thumbnailUrl
    rating
    reviewCount
    distillery
    abv
  }
}

query listNewArrivals($limit: Int) @auth(level: PUBLIC) {
  spirits(
    where: { isPublished: { eq: true } },
    limit: $limit, 
    orderBy: [{ createdAt: DESC }]
  ) {
    id
    name
    nameEn
    imageUrl
    thumbnailUrl
    category
    categoryEn
    country
    abv
    distillery
    descriptionKo
    descriptionEn
    updatedAt
    createdAt
  }
}

query getSpirit($id: String!) @auth(level: PUBLIC) {
  spirit(id: $id) {
    id
    name
    nameEn
    category
    categoryEn
    mainCategory
    subcategory
    distillery
    bottler
    abv
    volume
    country
    region
    imageUrl
    thumbnailUrl
    descriptionKo
    descriptionEn
    pairingGuideKo
    pairingGuideEn
    noseTags
    palateTags
    finishTags
    tastingNote
    status
    isPublished
    isReviewed
    rating
    reviewCount
    metadata
    reviews: spiritReviews_on_spirit {
      id
      rating
      content
      nose
      palate
      finish
      likedBy
      imageUrls
      createdAt
      updatedAt
      user {
        nickname
        profileImage
        role
      }
    }
  }
}

# Admin only query for raw data access with filtering and pagination
query adminListRawSpirits(
  $limit: Int, 
  $offset: Int, 
  $category: String, 
  $distillery: String, 
  $isPublished: Boolean, 
  $search: String
) @auth(level: PUBLIC) {
  spirits(
    limit: $limit, 
    offset: $offset, 
    orderBy: [{ updatedAt: DESC }],
    where: {
      _and: [
        { isPublished: { eq: $isPublished } },
        { distillery: { eq: $distillery } },
        { 
          _or: [
            { category: { eq: $category } },
            { categoryEn: { eq: $category } }
          ]
        },
        { 
          _or: [
            { name: { contains: $search } },
            { nameEn: { contains: $search } }
          ]
        }
      ]
    }
  ) {
    id
    name
    nameEn
    category
    categoryEn
    isPublished
    status
    updatedAt
    imageUrl
    thumbnailUrl
    abv
    distillery
    region
    subcategory
  }
}

