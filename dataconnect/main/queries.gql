
# Queries for the App

query listSpirits($category: String) @auth(level: PUBLIC) {
  spirits(where: { 
    isPublished: { eq: true },
    category: { eq: $category } 
  }) {
    id
    name
    nameEn
    category
    categoryEn
    imageUrl
    isPublished
    abv
    distillery
    rating
    reviewCount
  }
}

query listNewArrivals($limit: Int) @auth(level: PUBLIC) {
  spirits(
    where: { isPublished: { eq: true } },
    limit: $limit, 
    orderBy: [{ createdAt: DESC }]
  ) {
    id
    name
    nameEn
    imageUrl
    category
    categoryEn
    country
    abv
    distillery
    descriptionKo
    descriptionEn
    updatedAt
    createdAt
  }
}

query getSpirit($id: String!) @auth(level: PUBLIC) {
  spirit(id: $id) {
    id
    name
    nameEn
    category
    categoryEn
    mainCategory
    subcategory
    distillery
    bottler
    abv
    volume
    country
    region
    imageUrl
    thumbnailUrl
    descriptionKo
    descriptionEn
    pairingGuideKo
    pairingGuideEn
    noseTags
    palateTags
    finishTags
    tastingNote
    status
    isPublished
    isReviewed
    rating
    reviewCount
    metadata
    reviews: spiritReviews_on_spirit {
      id
      rating
      content
      nose
      palate
      finish
      likedBy
      imageUrls
      createdAt
      updatedAt
      user {
        nickname
        profileImage
        role
      }
    }
  }
}

# Admin only query for raw data access with filtering and pagination
query adminListRawSpirits(
  $limit: Int, 
  $offset: Int, 
  $category: String, 
  $distillery: String, 
  $isPublished: Boolean, 
  $search: String
) @auth(level: NO_ACCESS) {
  spirits(
    limit: $limit, 
    offset: $offset, 
    orderBy: [{ updatedAt: DESC }],
    where: {
      category: { eq: $category },
      distillery: { eq: $distillery },
      isPublished: { eq: $isPublished },
      name: { contains: $search }
    }
  ) {
    id
    name
    nameEn
    category
    categoryEn
    isPublished
    status
    updatedAt
    imageUrl
    thumbnailUrl
    abv
    distillery
    region
    subcategory
  }
}

query getUserProfile($id: String!) @auth(level: PUBLIC) {
  user(id: $id) {
    id
    nickname
    email
    profileImage
    role
    themePreference
    isFirstLogin
    reviewsWritten
    heartsReceived
  }
}

query listNewsArticles($limit: Int, $offset: Int) @auth(level: PUBLIC) {
  newsArticles(limit: $limit, offset: $offset, orderBy: [{ date: DESC }, { createdAt: DESC }]) {
    id
    title
    content
    imageUrl
    category
    source
    link
    date
    translations
    tags
    createdAt
  }
}

query getNewsArticle($id: String!) @auth(level: PUBLIC) {
  newsArticle(id: $id) {
    id
    title
    content
    imageUrl
    category
    source
    link
    date
    translations
    tags
    createdAt
  }
}

# --- Audit Queries ---
query auditAllUsers @auth(level: PUBLIC) {
  users {
    id
    nickname
    role
    isFirstLogin
  }
}

query auditAllNews @auth(level: PUBLIC) {
  newsArticles {
    id
    title
    translations
  }
}

query auditAllSpirits @auth(level: PUBLIC) {
  spirits {
    id
  }
}

query auditAllReviews @auth(level: PUBLIC) {
  spiritReviews {
    id
    spirit {
      id
      name
    }
    user {
      id
      nickname
    }
  }
}

query listSpiritReviews($limit: Int, $offset: Int) @auth(level: PUBLIC) {
  spiritReviews(limit: $limit, offset: $offset, orderBy: [{ createdAt: DESC }]) {
    id
    rating
    title
    content
    imageUrls
    createdAt
    spirit {
      id
      name
      imageUrl
    }
    user {
      id
      nickname
      profileImage
    }
  }
}

query getSpiritReviewsCount @auth(level: PUBLIC) {
  spiritReviews {
    id
  }
}

query listSpiritsForSitemap @auth(level: PUBLIC) {
  spirits(where: { isPublished: { eq: true } }) {
    id
    name
    category
    categoryEn
    imageUrl
    thumbnailUrl
    descriptionKo
    descriptionEn
    pairingGuideKo
    pairingGuideEn
    tastingNote
    noseTags
    palateTags
    finishTags
    updatedAt
  }
}

query getWorldCupResult($id: UUID!) @auth(level: PUBLIC) {
  worldCupResult(id: $id) {
    id
    winner {
      id
      name
      nameEn
      imageUrl
      thumbnailUrl
      category
      categoryEn
      subcategory
      distillery
      abv
      country
      region
      noseTags
      palateTags
      finishTags
    }
    category
    subcategory
    initialRound
    timestamp
  }
}

query listSpiritsForWorldCup($category: String, $subcategories: [String!]) @auth(level: PUBLIC) {
  spirits(where: {
    isPublished: { eq: true },
    category: { eq: $category },
    subcategory: { in: $subcategories }
  }, limit: 300) {
    id
    name
    nameEn
    imageUrl
    thumbnailUrl
    category
    categoryEn
    subcategory
    distillery
    abv
    country
    region
    noseTags
    palateTags
    finishTags
    createdAt
  }
}

query listAiDiscoveryLogs($limit: Int!) @auth(level: NO_ACCESS) {
  aiDiscoveryLogs(limit: $limit, orderBy: [{ createdAt: DESC }]) {
    id
    userId
    analysis
    recommendations
    messageHistory
    createdAt
  }
}

query listModificationRequests @auth(level: NO_ACCESS) {
  modificationRequests(orderBy: [{ createdAt: DESC }]) {
    id
    spiritId
    spiritName
    userId
    title
    content
    status
    createdAt
  }
}
